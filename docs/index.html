<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>页面复刻结果浏览</title>
    <style>
        :root {
            --bg: #f6f8fa;
            --surface: #ffffff;
            --ink: #1f2328;
            --muted: #656d76;
            --rule: #d0d7de;
            --accent: #0969da;
            --accent2: #1f883d;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            min-width: 1200px;
            overflow-x: auto;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--ink);
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--rule);
            padding: 1rem 1.5rem;
        }
        header h1 { margin: 0; font-size: 1.2rem; }
        header p { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.85rem; }
        main { padding: 1rem 1.5rem; min-width: 1200px; margin: 0 auto; }
        .card {
            background: var(--surface);
            border: 1px solid var(--rule);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: flex-end; }
        label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.3rem; }
        select, input[type="number"] {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--rule);
            border-radius: 6px;
            font-size: 0.95rem;
            min-width: 160px;
        }
        button {
            padding: 0.55rem 1.2rem;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
        }
        button.secondary { background: var(--accent2); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .status { font-size: 0.9rem; color: var(--muted); margin-top: 0.5rem; }
        .actions { margin-bottom: 1rem; }
        .actions a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        th, td {
            border: 1px solid var(--rule);
            padding: 0.6rem 0.8rem;
            text-align: center;
        }
        th { background: var(--bg); font-weight: 600; }
        td.left { text-align: left; }
        tr:hover { background: #f6f8fa; }
        .score { color: #d1242f; font-weight: 700; }
        .league { color: var(--muted); }
        .detail-link { color: var(--accent); text-decoration: none; }
        .detail-link:hover { text-decoration: underline; }
        .empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--muted);
        }
    </style>
</head>
<body>
<header>
    <h1>页面复刻结果浏览</h1>
    <p>选择已复刻日期查看第一层列表页；需要新增日期请在 Trae 里告诉我。</p>
</header>
<main>
    <div class="card">
        <div class="row">
            <div>
                <label for="dateSelect">选择日期</label>
                <select id="dateSelect"></select>
            </div>
            <div>
                <label for="levelInput">最大层级</label>
                <input type="number" id="levelInput" value="3" min="1" max="5" disabled title="仅后端服务可调整">
            </div>
            <button id="viewBtn">查看数据</button>
            <button id="replicateBtn" class="secondary" title="后端服务在本地运行，点击后请告诉我你要复刻的日期">开始复刻</button>
        </div>
        <div class="status" id="status"></div>
    </div>

    <div class="card">
        <strong>复刻结果预览（第一层列表页）</strong>
        <div class="actions" id="actions"></div>
        <div id="preview"></div>
    </div>
</main>

<script>
let dates = [];

async function loadDates() {
    const resp = await fetch('dates.json');
    dates = await resp.json();
    const select = document.getElementById('dateSelect');
    select.innerHTML = '';
    if (dates.length === 0) {
        select.innerHTML = '<option>暂无数据</option>';
        return;
    }
    dates.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.date;
        opt.textContent = d.date;
        select.appendChild(opt);
    });
    showDate(dates[0].date);
}

function showDate(date) {
    const item = dates.find(d => d.date === date);
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');
    const actions = document.getElementById('actions');
    if (!item) {
        preview.innerHTML = '<div class="empty">未找到该日期数据</div>';
        status.textContent = '';
        actions.innerHTML = '';
        return;
    }

    actions.innerHTML = `<a href="${item.list_page}" target="_blank">在新标签页打开原始复刻列表页 ↗</a>`;

    let html = `
        <table>
            <thead>
                <tr>
                    <th>序号</th>
                    <th>联赛</th>
                    <th>比赛时间</th>
                    <th>主队</th>
                    <th>比分</th>
                    <th>客队</th>
                    <th>状态</th>
                    <th>详情</th>
                </tr>
            </thead>
            <tbody>
    `;
    item.matches.forEach((m, idx) => {
        const detailUrl = `${date}/analysis/${m.match_id}.htm`;
        html += `
            <tr>
                <td>${idx + 1}</td>
                <td class="league">${m.league}</td>
                <td>${m.match_time}</td>
                <td class="left">${m.home_team}</td>
                <td class="score">-</td>
                <td class="left">${m.away_team}</td>
                <td>${m.status}</td>
                <td><a class="detail-link" href="${detailUrl}" target="_blank">查看</a></td>
            </tr>
        `;
    });
    html += '</tbody></table>';

    preview.innerHTML = html;
    status.textContent = `已加载 ${date}，共 ${item.matches.length} 场比赛`;
}

document.getElementById('viewBtn').onclick = () => {
    showDate(document.getElementById('dateSelect').value);
};

document.getElementById('replicateBtn').onclick = () => {
    const date = document.getElementById('dateSelect').value;
    const level = document.getElementById('levelInput').value;
    alert(`请告诉后端操作员：帮我复刻 ${date}，最大层级 ${level}`);
};

loadDates();
</script>
</body>
</html>
