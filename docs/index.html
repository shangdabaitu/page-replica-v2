<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>页面复刻结果浏览</title>
    <style>
        :root {
            --bg: #f6f8fa;
            --surface: #ffffff;
            --ink: #1f2328;
            --muted: #656d76;
            --rule: #d0d7de;
            --accent: #0969da;
            --accent2: #1f883d;
            --warn: #d1242f;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            min-width: 1200px;
            overflow-x: auto;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--ink);
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--rule);
            padding: 1rem 1.5rem;
        }
        header h1 { margin: 0; font-size: 1.2rem; }
        header p { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.85rem; }
        main { padding: 1rem 1.5rem; min-width: 1200px; margin: 0 auto; }
        .card {
            background: var(--surface);
            border: 1px solid var(--rule);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: flex-end; }
        label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.3rem; }
        select, input[type="number"] {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--rule);
            border-radius: 6px;
            font-size: 0.95rem;
            min-width: 160px;
        }
        button {
            padding: 0.55rem 1.2rem;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
        }
        button.secondary { background: var(--accent2); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .status { font-size: 0.9rem; color: var(--muted); margin-top: 0.5rem; }
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        .stats-table th, .stats-table td {
            border: 1px solid var(--rule);
            padding: 0.55rem 0.65rem;
            text-align: left;
        }
        .stats-table th {
            background: #f3f4f6;
            font-weight: 600;
            white-space: nowrap;
        }
        .stats-table tr:hover { background: #f6f8fa; }
        .stats-table .num { text-align: center; white-space: nowrap; }
        .stats-table .ok { color: var(--accent2); font-weight: 600; }
        .stats-table .warn { color: var(--warn); font-weight: 600; }
        .preview-wrapper {
            min-width: 1100px;
            overflow-x: auto;
            border: 1px solid var(--rule);
            border-radius: 6px;
            background: var(--surface);
        }
        iframe {
            width: 1100px;
            height: 900px;
            border: none;
            display: block;
        }
        .actions { margin-bottom: 0.75rem; }
        .actions a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
        .empty { padding: 2rem; color: var(--muted); text-align: center; }
        .section-title { font-weight: 600; margin-bottom: 0.5rem; display: block; }
        .hint { color: var(--muted); font-size: 0.8rem; margin-top: 0.25rem; }
    </style>
</head>
<body>
<header>
    <h1>页面复刻结果浏览</h1>
    <p>选择已复刻日期，查看每场比赛的复刻/视觉对比统计，并在下方预览列表页。</p>
</header>
<main>
    <div class="card">
        <div class="row">
            <div>
                <label for="dateSelect">选择日期</label>
                <select id="dateSelect"></select>
            </div>
            <div>
                <label for="levelInput">最大层级</label>
                <input type="number" id="levelInput" value="3" min="1" max="5" disabled title="仅后端服务可调整">
            </div>
            <button id="viewBtn">查看数据</button>
            <button id="replicateBtn" class="secondary" title="后端服务在本地运行，点击后请告诉我你要复刻的日期">开始复刻</button>
        </div>
        <div class="status" id="status"></div>
    </div>

    <div class="card" id="statsCard" style="display:none;">
        <span class="section-title">比赛复刻统计</span>
        <div id="statsTableWrap"></div>
        <div class="hint">说明：L1 为整站列表页（1 面）；L2 为从列表页进入的赛事类型名称页 + 亚 + 欧 + 析（4 面）；L3 为从赛事类型页进入的亚/欧/析/大（4 面）加上从析页面进入的主队/客队资料库（2 面），合计 6 面。视觉对比已覆盖第一场比赛的全部 L1/L2/L3 页面。</div>
    </div>

    <div class="card">
        <span class="section-title">复刻结果预览（第一层列表页）</span>
        <div class="actions" id="actions"></div>
        <div class="preview-wrapper" id="previewWrapper">
            <div class="empty" id="emptyMsg">加载中…</div>
        </div>
    </div>
</main>

<script>
let dates = [];
let currentMeta = null;

async function loadDates() {
    try {
        const resp = await fetch('dates.json');
        dates = await resp.json();
    } catch (e) {
        dates = [];
    }
    const select = document.getElementById('dateSelect');
    select.innerHTML = '';
    if (dates.length === 0) {
        select.innerHTML = '<option>暂无数据</option>';
        document.getElementById('emptyMsg').textContent = '暂无已复刻日期数据';
        return;
    }
    dates.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.date;
        opt.textContent = d.date;
        select.appendChild(opt);
    });
    showDate(dates[0].date);
}

async function loadMeta(date) {
    try {
        const resp = await fetch(`${date}/meta.json`);
        if (!resp.ok) return null;
        return await resp.json();
    } catch (e) {
        return null;
    }
}

function isCompared(page) {
    return page && page.diff_ratio !== null && page.diff_ratio !== undefined && !isNaN(page.diff_ratio);
}

function calcMatchStats(match, pages) {
    const matchId = String(match.match_id || '');
    const homeId = String(match.home_team_id || '');
    const awayId = String(match.away_team_id || '');
    const league = String(match.league || '');

    // L1: 整站 1 个列表页
    const l1Pages = pages.filter(p => p.level === 1);
    const l1Compared = l1Pages.filter(isCompared).length;

    // L2: 从列表页进入的赛事类型名称页 + 亚 + 欧 + 析（4 面）
    const detailUrlPatterns = [
        new RegExp('AsianOdds_n\\.aspx\\?id=' + matchId),
        new RegExp('oddslist/' + matchId + '\\.htm'),
        new RegExp('analysis/' + matchId + 'cn\\.htm'),
    ];
    const l2DetailPages = pages.filter(p =>
        p.level === 2 && detailUrlPatterns.some(re => re.test(p.url || ''))
    );
    // 赛事类型页：按联赛名称匹配页面标题中的联赛文字（复刻页 URL 中不含联赛名，用页面文本近似）
    const l2LeaguePages = pages.filter(p =>
        p.level === 2 &&
        /(?:SubLeague|CupMatch|League)\/\d+\.html/i.test(p.url || '') &&
        league &&
        (p.url || '').includes(matchId) === false
    );
    // 更可靠：赛事类型页只有 1 个，整站共享，若存在已对比的赛事类型页则所有同联赛比赛都计 1
    const hasL2LeagueCompared = l2LeaguePages.some(isCompared);
    const l2Compared = l2DetailPages.filter(isCompared).length + (hasL2LeagueCompared ? 1 : 0);

    // L3: 从赛事类型页进入的亚/欧/析/大（4 面）+ 从析页进入的主队/客队资料库（2 面）= 6 面
    // 亚/欧/析 在 L2 已复刻，从 L3 入口看仍属于 L3 应访问页面，故重复计入
    const l3OverPage = pages.filter(p =>
        p.url && p.url.includes('OverDown_n.aspx?id=' + matchId)
    );
    const l3TeamPages = pages.filter(p => {
        const m = p.url && p.url.match(/team\/(?:Summary\/)?(\d+)\.html/i);
        if (!m) return false;
        const tid = m[1];
        return tid === homeId || tid === awayId;
    });
    const l3Compared =
        l2DetailPages.filter(isCompared).length +
        l3OverPage.filter(isCompared).length +
        l3TeamPages.filter(isCompared).length;

    return {
        l1: { expected: 1, compared: l1Compared },
        l2: { expected: 4, compared: l2Compared },
        l3: { expected: 6, compared: l3Compared },
    };
}

function renderStats(item, meta) {
    const pages = (meta && meta.pages) || [];
    const matches = item.matches || [];
    const wrap = document.getElementById('statsTableWrap');
    const card = document.getElementById('statsCard');

    if (!matches.length) {
        card.style.display = 'none';
        wrap.innerHTML = '';
        return;
    }

    let html = `<table class="stats-table">
        <thead>
            <tr>
                <th>联赛</th>
                <th>开赛时间</th>
                <th>主队</th>
                <th>客队</th>
                <th>状态</th>
                <th class="num">L1 应复刻 / 已视觉对比</th>
                <th class="num">L2 应复刻 / 已视觉对比</th>
                <th class="num">L3 应复刻 / 已视觉对比</th>
            </tr>
        </thead>
        <tbody>`;

    for (const match of matches) {
        const s = calcMatchStats(match, pages);
        const l1Cls = s.l1.compared >= s.l1.expected ? 'ok' : 'warn';
        const l2Cls = s.l2.compared >= s.l2.expected ? 'ok' : 'warn';
        const l3Cls = s.l3.compared >= s.l3.expected ? 'ok' : 'warn';
        html += `<tr>
            <td>${escapeHtml(match.league || '-')}</td>
            <td>${escapeHtml(match.match_time || '-')}</td>
            <td>${escapeHtml(match.home_team || '-')}</td>
            <td>${escapeHtml(match.away_team || '-')}</td>
            <td>${escapeHtml(match.status || '-')}</td>
            <td class="num ${l1Cls}">${s.l1.expected} / ${s.l1.compared}</td>
            <td class="num ${l2Cls}">${s.l2.expected} / ${s.l2.compared}</td>
            <td class="num ${l3Cls}">${s.l3.expected} / ${s.l3.compared}</td>
        </tr>`;
    }

    html += '</tbody></table>';
    wrap.innerHTML = html;
    card.style.display = 'block';
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function showDate(date) {
    const item = dates.find(d => d.date === date);
    const wrapper = document.getElementById('previewWrapper');
    const status = document.getElementById('status');
    const actions = document.getElementById('actions');
    const statsCard = document.getElementById('statsCard');

    if (!item) {
        wrapper.innerHTML = '<div class="empty">未找到该日期数据</div>';
        status.textContent = '';
        actions.innerHTML = '';
        statsCard.style.display = 'none';
        return;
    }

    currentMeta = await loadMeta(date);
    renderStats(item, currentMeta);

    actions.innerHTML = `<a href="${item.list_page}" target="_blank">在新标签页打开原始复刻列表页 ↗</a>`;
    wrapper.innerHTML = `<iframe src="${item.list_page}" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>`;
    status.textContent = `已加载 ${date}，共 ${item.matches.length} 场比赛`;
}

document.getElementById('viewBtn').onclick = () => {
    showDate(document.getElementById('dateSelect').value);
};

document.getElementById('replicateBtn').onclick = () => {
    const date = document.getElementById('dateSelect').value;
    const level = document.getElementById('levelInput').value;
    alert(`请告诉后端操作员：帮我复刻 ${date}，最大层级 ${level}`);
};

loadDates();
</script>
</body>
</html>
